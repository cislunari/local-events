name: Daily event refresh

on:
  schedule:
      - cron: "0 2 * * *"
        workflow_dispatch: {}

        permissions:
          contents: write

          concurrency:
            group: refresh
              cancel-in-progress: false

              jobs:
                scrape:
                    runs-on: ubuntu-latest
                        timeout-minutes: 10

                            steps:
                                  - name: Checkout repo
                                          uses: actions/checkout@v4

                                                - name: Set up Node.js
                                                        uses: actions/setup-node@v4
                                                                with:
                                                                          node-version: "20"

                                                                                - name: Install dependencies
                                                                                        working-directory: scraper
                                                                                                run: npm install

                                                                                                      - name: Install Playwright Chromium
                                                                                                              working-directory: scraper
                                                                                                                      run: npx playwright install --with-deps chromium
                                                                                                                      
                                                                                                                            - name: Run scraper
                                                                                                                                    run: node scraper/scrape.js
                                                                                                                                            env:
                                                                                                                                                      TZ: Europe/Berlin
                                                                                                                                                      
                                                                                                                                                            - name: Commit refreshed events.json
                                                                                                                                                                    run: |
                                                                                                                                                                              if git diff --quiet -- events.json; then
                                                                                                                                                                                          echo "No changes to events.json."
                                                                                                                                                                                                    else
                                                                                                                                                                                                                git config user.name "events-bot"
                                                                                                                                                                                                                            git config user.email "events-bot@users.noreply.github.com"
                                                                                                                                                                                                                                        git add events.json
                                                                                                                                                                                                                                                    git commit -m "chore: refresh events for $(date -u +%Y-%m-%d)"
                                                                                                                                                                                                                                                                git push
                                                                                                                                                                                                                                                                          fi
                                                                                                                                                                                                                                                                          
